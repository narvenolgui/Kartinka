<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Перетягивание каната — простой надрыв</title>
    <style>
        body {
            background: white;
            font-family: system-ui, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            padding: 24px;
            text-align: center;
            max-width: 800px;
        }
        svg {
            background: white;
            border-radius: 16px;
            width: 100%;
            height: auto;
            margin-bottom: 20px;
            border: 1px solid #e0e7f0;
        }
        button {
            background: #1a2a4a;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 500;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: #0e1a2f;
            transform: scale(0.97);
        }
        .status {
            margin-top: 16px;
            font-size: 14px;
            color: #1a2a4a;
            height: 24px;
        }
    </style>
</head>
<body>
<div class="card">
    <h3>⚡ Перетягивание каната ⚡</h3>
    <p>Левый и правый тянут — верёвка прямая, надрыв только полосками</p>

    <!-- SVG рисунок -->
    <svg id="tugSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">
        <defs>
            <style>
                .body-line { fill: none; stroke: #1a2a4a; stroke-linecap: round; stroke-linejoin: round; }
                .torso { stroke-width: 6; }
                .limb { stroke-width: 4.5; }
                .head { stroke-width: 5; }
                .rope { stroke-width: 3.5; stroke: #1a2a4a; }
                .tear { stroke-width: 1.8; stroke: #1a2a4a; }
            </style>
        </defs>

        <!-- Левый человечек (тянет влево) -->
        <circle cx="130" cy="100" r="24" class="body-line head" />
        <path d="M130 124 C118 148 102 170 92 195" class="body-line torso" />
        <path d="M112 145 C95 150 75 154 55 158" class="body-line limb" />
        <path d="M112 145 C125 149 138 153 150 157" class="body-line limb" />
        <path d="M92 195 C78 215 64 240 56 270" class="body-line limb" />
        <path d="M92 195 C104 215 116 240 122 270" class="body-line limb" />

        <!-- Правый человечек (тянет вправо) -->
        <circle cx="570" cy="100" r="24" class="body-line head" />
        <path d="M570 124 C582 148 598 170 608 195" class="body-line torso" />
        <path d="M588 145 C605 150 625 154 645 158" class="body-line limb" />
        <path d="M588 145 C575 149 562 153 550 157" class="body-line limb" />
        <path d="M608 195 C622 215 636 240 644 270" class="body-line limb" />
        <path d="M608 195 C596 215 584 240 578 270" class="body-line limb" />

        <!-- Прямая верёвка (одинаковой толщины) -->
        <line x1="55" y1="160" x2="645" y2="160" class="rope" />

        <!-- Надрыв: две полоски сверху, три снизу (тонкие) -->
        <!-- Верхние -->
        <line x1="335" y1="160" x2="325" y2="140" class="tear" />
        <line x1="365" y1="160" x2="375" y2="140" class="tear" />
        <!-- Нижние -->
        <line x1="325" y1="160" x2="315" y2="180" class="tear" />
        <line x1="350" y1="160" x2="350" y2="185" class="tear" />
        <line x1="375" y1="160" x2="385" y2="180" class="tear" />

        <!-- Линии напряжения у голов (необязательно, для динамики) -->
        <path d="M88 68 C78 58 68 50 62 45" class="tear" />
        <path d="M94 78 C84 70 74 64 68 60" class="tear" />
        <path d="M612 68 C622 58 632 50 638 45" class="tear" />
        <path d="M606 78 C616 70 626 64 632 60" class="tear" />
    </svg>

    <br />
    <button id="copyBtn">📋 Скопировать SVG-код</button>
    <div id="copyStatus" class="status"></div>
</div>

<script>
    const svgElement = document.getElementById('tugSvg');
    const copyButton = document.getElementById('copyBtn');
    const statusDiv = document.getElementById('copyStatus');

    // Получаем SVG как строку
    function getSvgString() {
        const serializer = new XMLSerializer();
        let svgText = serializer.serializeToString(svgElement);
        // Добавляем XML-декларацию для чистоты (опционально)
        return svgText;
    }

    copyButton.addEventListener('click', async () => {
        const svgCode = getSvgString();
        try {
            await navigator.clipboard.writeText(svgCode);
            statusDiv.textContent = '✅ SVG скопирован! Сохраните в файл .svg и откройте в браузере.';
            statusDiv.style.color = '#1a6e1a';
            setTimeout(() => {
                statusDiv.textContent = '';
            }, 3000);
        } catch (err) {
            statusDiv.textContent = '❌ Ошибка копирования. Выделите код вручную.';
            statusDiv.style.color = '#b33';
            // Запасной вариант: показываем текст в alert
            alert('Скопируйте код вручную:\n' + svgCode);
        }
    });
</script>
</body>
</html>
