<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <!-- Левый человечек -->
  <circle cx="140" cy="80" r="20" fill="none" stroke="black" stroke-width="3"/>
  <line x1="140" y1="100" x2="140" y2="160" stroke="black" stroke-width="3"/>
  <!-- Левая рука (вытянута в сторону) -->
  <line x1="140" y1="120" x2="80" y2="130" stroke="black" stroke-width="3"/>
  <!-- Правая рука (обнимает) - будет нарисована позже, за правым человечком -->
  <line x1="140" y1="120" x2="170" y2="110" stroke="black" stroke-width="3"/>
  <line x1="140" y1="160" x2="120" y2="190" stroke="black" stroke-width="3"/>
  <line x1="140" y1="160" x2="160" y2="190" stroke="black" stroke-width="3"/>

  <!-- Правый человечек -->
  <circle cx="260" cy="80" r="20" fill="none" stroke="black" stroke-width="3"/>
  <line x1="260" y1="100" x2="260" y2="160" stroke="black" stroke-width="3"/>
  <!-- Правая рука (вытянута в сторону) -->
  <line x1="260" y1="120" x2="320" y2="130" stroke="black" stroke-width="3"/>
  <!-- Левая рука (обнимает) -->
  <line x1="260" y1="120" x2="230" y2="110" stroke="black" stroke-width="3"/>
  <line x1="260" y1="160" x2="240" y2="190" stroke="black" stroke-width="3"/>
  <line x1="260" y1="160" x2="280" y2="190" stroke="black" stroke-width="3"/>

  <!-- Дополнительная линия, чтобы показать, что руки лежат на плечах (опционально) -->
  <line x1="170" y1="110" x2="240" y2="70" stroke="black" stroke-width="2" stroke-dasharray="4,2"/>
</svg>
