<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">
  <defs>
    <style>
      .body-line { fill: none; stroke: #1a2a4a; stroke-linecap: round; stroke-linejoin: round; }
      .torso { stroke-width: 6; }
      .limb { stroke-width: 4.5; }
      .head { stroke-width: 5; }
      .rope { stroke-width: 4; stroke: #1a2a4a; }
      .tension { stroke-width: 2.5; stroke: #1a2a4a; }
    </style>
  </defs>

  <!-- ЛЕВЫЙ ЧЕЛОВЕЧЕК (наклон влево) -->
  <circle cx="130" cy="90" r="24" class="body-line head" />
  <path d="M130 114 C118 140 102 165 92 195" class="body-line torso" />
  <path d="M112 145 C88 150 65 155 45 160" class="body-line limb" />
  <path d="M112 145 C126 150 140 155 152 160" class="body-line limb" />
  <path d="M92 195 C78 215 64 240 56 270" class="body-line limb" />
  <path d="M92 195 C104 215 116 240 122 270" class="body-line limb" />

  <!-- ПРАВЫЙ ЧЕЛОВЕЧЕК (наклон вправо) -->
  <circle cx="570" cy="90" r="24" class="body-line head" />
  <path d="M570 114 C582 140 598 165 608 195" class="body-line torso" />
  <path d="M588 145 C612 150 635 155 655 160" class="body-line limb" />
  <path d="M588 145 C574 150 560 155 548 160" class="body-line limb" />
  <path d="M608 195 C622 215 636 240 644 270" class="body-line limb" />
  <path d="M608 195 C596 215 584 240 578 270" class="body-line limb" />

  <!-- КАНАТ (слитный с разрывом посередине) -->
  <path d="M45 160 C100 165 150 162 200 160 
           L210 148 L220 162 L230 148 L240 162 L250 148 
           L260 162 L270 148 L280 162 
           C330 165 380 162 450 160 
           L460 148 L470 162 L480 148 L490 162 L500 148 
           L510 162 L520 148 L530 162 
           C570 165 620 162 655 160" class="rope" />

  <!-- ЛИНИИ НАПРЯЖЕНИЯ / ЗЛОСТИ -->
  <path d="M88 58 C78 48 68 40 62 35" class="tension" />
  <path d="M94 68 C84 60 74 54 68 50" class="tension" />
  <path d="M612 58 C622 48 632 40 638 35" class="tension" />
  <path d="M606 68 C616 60 626 54 632 50" class="tension" />
</svg>
