<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тянут канат — перетягивание с разрывом</title>
    <style>
        body {
            background: white;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            padding: 24px;
            text-align: center;
            max-width: 800px;
        }
        svg {
            background: white;
            border-radius: 16px;
            width: 100%;
            height: auto;
            margin-bottom: 20px;
            border: 1px solid #eaeef5;
        }
        button {
            background: #1a2a4a;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        button:hover {
            background: #0e1a2f;
            transform: scale(0.98);
        }
        textarea {
            width: 100%;
            height: 1px;
            opacity: 0;
            position: absolute;
            pointer-events: none;
        }
        .status {
            margin-top: 12px;
            font-size: 14px;
            color: #2c6e2c;
            height: 24px;
        }
    </style>
</head>
<body>
<div class="card">
    <h3>⚡ Перетягивание каната ⚡</h3>
    <p>Левый и правый тянут в разные стороны — верёвка рвётся посередине</p>

    <!-- Здесь будет SVG -->
    <div id="svgContainer">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">
            <defs>
                <style>
                    .body-line { fill: none; stroke: #1a2a4a; stroke-linecap: round; stroke-linejoin: round; }
                    .torso { stroke-width: 6; }
                    .limb { stroke-width: 4.5; }
                    .head { stroke-width: 5; }
                    .rope { stroke-width: 4; stroke: #1a2a4a; }
                    .tear { stroke-width: 2; stroke: #1a2a4a; }
                </style>
            </defs>

            <!-- ЛЕВЫЙ ЧЕЛОВЕЧЕК -->
            <circle cx="130" cy="90" r="24" class="body-line head" />
            <path d="M130 114 C118 140 102 165 92 195" class="body-line torso" />
            <path d="M112 145 C95 150 75 154 55 158 C48 159 44 162 45 165" class="body-line limb" />
            <path d="M112 145 C125 149 138 153 150 157 C156 159 158 162 155 165" class="body-line limb" />
            <path d="M92 195 C78 215 64 240 56 270 C52 282 55 286 60 284" class="body-line limb" />
            <path d="M92 195 C104 215 116 240 122 270 C126 282 123 286 118 284" class="body-line limb" />

            <!-- ПРАВЫЙ ЧЕЛОВЕЧЕК -->
            <circle cx="570" cy="90" r="24" class="body-line head" />
            <path d="M570 114 C582 140 598 165 608 195" class="body-line torso" />
            <path d="M588 145 C605 150 625 154 645 158 C652 159 656 162 655 165" class="body-line limb" />
            <path d="M588 145 C575 149 562 153 550 157 C544 159 542 162 545 165" class="body-line limb" />
            <path d="M608 195 C622 215 636 240 644 270 C648 282 645 286 640 284" class="body-line limb" />
            <path d="M608 195 C596 215 584 240 578 270 C574 282 577 286 582 284" class="body-line limb" />

            <!-- КАНАТ (один зигзаг, толщина та же) -->
            <path d="M45 165 
                     C100 167 180 163 280 160 
                     L330 150 L370 170 
                     C420 163 500 165 600 163 
                     L655 165" class="rope" />

            <!-- ПОЛОСКИ НАДРЫВА (не утолщают верёвку) -->
            <line x1="340" y1="155" x2="330" y2="135" class="tear" />
            <line x1="350" y1="158" x2="350" y2="130" class="tear" />
            <line x1="360" y1="162" x2="370" y2="140" class="tear" />
            <line x1="345" y1="165" x2="335" y2="185" class="tear" />
            <line x1="355" y1="168" x2="365" y2="190" class="tear" />
            <line x1="365" y1="170" x2="380" y2="180" class="tear" />
            <line x1="325" y1="145" x2="315" y2="135" class="tear" />
            <line x1="375" y1="145" x2="385" y2="135" class="tear" />

            <!-- ЛИНИИ НАПРЯЖЕНИЯ У ГОЛОВ -->
            <path d="M88 58 C78 48 68 40 62 35" class="tear" />
            <path d="M94 68 C84 60 74 54 68 50" class="tear" />
            <path d="M612 58 C622 48 632 40 638 35" class="tear" />
            <path d="M606 68 C616 60 626 54 632 50" class="tear" />
        </svg>
    </div>

    <button id="copyButton">📋 Скопировать SVG-код</button>
    <div class="status" id="copyStatus"></div>

    <textarea id="svgSource" readonly></textarea>
</div>

<script>
    // Заполняем textarea содержимым SVG (берём из DOM)
    const svgElement = document.querySelector('#svgContainer svg');
    const serializer = new XMLSerializer();
    let svgString = serializer.serializeToString(svgElement);
    
    // Добавляем XML-декларацию и стандартные атрибуты (чтобы код был чистым)
    svgString = svgString.replace('xmlns="http://www.w3.org/2000/svg"', 'xmlns="http://www.w3.org/2000/svg"');
    const fullSvgCode = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">\n${svgString.match(/<defs>[\s\S]*<\/svg>/i)?.[0].replace(/<\/svg>/, '') || svgString}</svg>`;
    
    // Более чистый способ: просто храним финальный код в переменной
    const finalCode = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">
  <defs>
    <style>
      .body-line { fill: none; stroke: #1a2a4a; stroke-linecap: round; stroke-linejoin: round; }
      .torso { stroke-width: 6; }
      .limb { stroke-width: 4.5; }
      .head { stroke-width: 5; }
      .rope { stroke-width: 4; stroke: #1a2a4a; }
      .tear { stroke-width: 2; stroke: #1a2a4a; }
    </style>
  </defs>
  <circle cx="130" cy="90" r="24" class="body-line head" />
  <path d="M130 114 C118 140 102 165 92 195" class="body-line torso" />
  <path d="M112 145 C95 150 75 154 55 158 C48 159 44 162 45 165" class="body-line limb" />
  <path d="M112 145 C125 149 138 153 150 157 C156 159 158 162 155 165" class="body-line limb" />
  <path d="M92 195 C78 215 64 240 56 270 C52 282 55 286 60 284" class="body-line limb" />
  <path d="M92 195 C104 215 116 240 122 270 C126 282 123 286 118 284" class="body-line limb" />
  <circle cx="570" cy="90" r="24" class="body-line head" />
  <path d="M570 114 C582 140 598 165 608 195" class="body-line torso" />
  <path d="M588 145 C605 150 625 154 645 158 C652 159 656 162 655 165" class="body-line limb" />
  <path d="M588 145 C575 149 562 153 550 157 C544 159 542 162 545 165" class="body-line limb" />
  <path d="M608 195 C622 215 636 240 644 270 C648 282 645 286 640 284" class="body-line limb" />
  <path d="M608 195 C596 215 584 240 578 270 C574 282 577 286 582 284" class="body-line limb" />
  <path d="M45 165 C100 167 180 163 280 160 L330 150 L370 170 C420 163 500 165 600 163 L655 165" class="rope" />
  <line x1="340" y1="155" x2="330" y2="135" class="tear" />
  <line x1="350" y1="158" x2="350" y2="130" class="tear" />
  <line x1="360" y1="162" x2="370" y2="140" class="tear" />
  <line x1="345" y1="165" x2="335" y2="185" class="tear" />
  <line x1="355" y1="168" x2="365" y2="190" class="tear" />
  <line x1="365" y1="170" x2="380" y2="180" class="tear" />
  <line x1="325" y1="145" x2="315" y2="135" class="tear" />
  <line x1="375" y1="145" x2="385" y2="135" class="tear" />
  <path d="M88 58 C78 48 68 40 62 35" class="tear" />
  <path d="M94 68 C84 60 74 54 68 50" class="tear" />
  <path d="M612 58 C622 48 632 40 638 35" class="tear" />
  <path d="M606 68 C616 60 626 54 632 50" class="tear" />
</svg>`;

    document.getElementById('svgSource').value = finalCode;

    const copyBtn = document.getElementById('copyButton');
    const statusDiv = document.getElementById('copyStatus');

    copyBtn.addEventListener('click', async () => {
        try {
            await navigator.clipboard.writeText(finalCode);
            statusDiv.textContent = '✅ SVG-код скопирован! Вставьте его в блокнот и сохраните с расширением .svg';
            statusDiv.style.color = '#1a2a4a';
            setTimeout(() => {
                statusDiv.textContent = '';
            }, 3000);
        } catch (err) {
            statusDiv.textContent = '❌ Не удалось скопировать. Выделите код вручную.';
            statusDiv.style.color = '#b33';
        }
    });
</script>
</body>
</html>
